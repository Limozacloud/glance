name: Release Please

on:
  workflow_dispatch:
    inputs:
      publish_tag:
        description: 'Existing tag to build & attach wheel for (e.g. v0.4.0). Leave empty for a normal release run.'
        required: false
        default: ''
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Builds the wheel in the SAME run as the release (or via manual dispatch).
  # A release created by release-please uses GITHUB_TOKEN, which does NOT trigger
  # a separate `on: release` workflow — so the publish lives here instead.
  publish-wheel:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_tag != '') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_tag != '' && github.event.inputs.publish_tag) || needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install hatch

      - run: hatch build --target wheel

      - name: Upload wheel to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ env.TAG }}" dist/*.whl --clobber
