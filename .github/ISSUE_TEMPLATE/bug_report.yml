name: Bug report
description: Something glance got wrong (a missed library, a bad version, a crash).
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did glance do, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: The command, config, and (if possible) the file/package involved.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / distro
      placeholder: "e.g. RHEL 9.3, Ubuntu 22.04, Alpine 3.19"
  - type: input
    id: version
    attributes:
      label: glance version
      placeholder: "glance --version"
