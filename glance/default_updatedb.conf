# updatedb configuration for glance agent deployment.
#
# Pass this file to updatedb via --config-file to get deterministic DB
# coverage independent of whatever /etc/updatedb.conf exists on the target.
#
# Agent invocation:
#   ./updatedb -l 0 \
#     --config-file /opt/limoza/etc/updatedb.conf \
#     --output /var/lib/limoza/plocate.db \
#     -U /
#
# Design decisions:
#   PRUNEFS  — excludes virtual and network filesystems that carry no
#              persistent software. overlay is intentionally NOT excluded
#              so that Docker container layers (/var/lib/docker/overlay2/*/
#              merged) are indexed and container enrichment works.
#   PRUNEPATHS — empty. Glance filters paths at query time using its own
#              exclude_paths / exclude_fs_types config. Path-based pruning
#              here would silently shrink coverage in ways the scan report
#              would not show.
#   PRUNENAMES — empty. File-name pruning is handled by Glance's glob gate.

PRUNEFS="9p afs anon_inodefs autofs binfmt_misc cgroup cgroup2 cifs coda
 configfs cpuset debugfs devfs devpts devtmpfs ecryptfs ftpfs fuse.encfs
 fuse.gvfsd-fuse fuse.mtp fuse.sshfs fusectl gfs gfs2 hugetlbfs iso9660
 jffs2 lustre mqueue ncpfs nfs nfs4 nfsd ocfs2 proc pstore ramfs romfs
 rpc_pipefs securityfs selinuxfs smbfs squashfs sysfs tmpfs tracefs udf
 usbfs"

PRUNEPATHS=""

PRUNENAMES=""
