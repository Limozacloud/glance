# glance default scan configuration.
#
# Every key below is optional — these are the built-in defaults (which also live
# in code, so glance runs with no config at all). Copy this file, edit what you
# need, and pass it with `--config`. Present keys override the default; absent
# keys keep it. Unknown keys are a hard error (a typo must not silently change
# what gets scanned).

# ---------------------------------------------------------------------------
# Scope
# ---------------------------------------------------------------------------

# Paths to exclude from results (prefix match).
exclude_paths: []

# Filesystem types excluded from results — plocate may index these but glance
# will not return paths under their mount points.
exclude_fs_types:
  - nfs
  - nfs4
  - cifs
  - smbfs
  - fuse.sshfs
  - overlay
  - tmpfs
  - devtmpfs
  - proc
  - sysfs
  - cgroup
  - cgroup2
  - squashfs
  - autofs

# The glob gate. null = derive from the active classifiers (recommended).
# Example to narrow it:
#   file_globs:
#     - "**/libcrypto.so*"
#     - "**/libssl.so*"
#     - "**/openssl"
file_globs: null

# ---------------------------------------------------------------------------
# Discovery engine (Linux: plocate required)
# ---------------------------------------------------------------------------

# Path to the plocate binary. null = search $PATH.
# Set this when the agent ships a static plocate binary at a fixed path.
# Example: /opt/limoza/bin/plocate
plocate_binary: null

# Path to the plocate DB. null = /var/lib/plocate/plocate.db.
# A RuntimeError is raised if the DB does not exist.
# Example: /var/lib/limoza/plocate.db
locate_db_path: null

# Path to the updatedb binary. Glance does not call updatedb itself —
# this key is read by the agent to know which binary to use when
# (re-)building the locate database.
# Example: /opt/limoza/bin/updatedb
updatedb_binary: null

# Path to an updatedb.conf passed via --config-file when building the DB.
# null = updatedb falls back to /etc/updatedb.conf on the target system,
# which may prune paths or filesystems we need to scan.
# Point this to the shipped default_updatedb.conf for deterministic coverage.
# Example: /opt/limoza/etc/updatedb.conf
updatedb_config: null

# ---------------------------------------------------------------------------
# Catalogers
# ---------------------------------------------------------------------------

# Which catalogers to run. null = all applicable on this host.
# Groups: software, binary, ecosystem, ecosystem-installed, ecosystem-project, all
# Individuals: dpkg, rpm, apk, registry, binary, win_binary, gobinary,
#              distinfo, node_installed, jar, gem_installed,
#              pip, go, npm, nuget, maven, gem
catalogers: null

# Controls which catalogers the "ecosystem" group resolves to.
#   installed (default) — reads actual install stores (dist-info, node_modules,
#                         JARs via pom.properties, gemspecs)
#   project             — reads lock/manifest files (requirements.txt, go.sum,
#                         package-lock.json, pom.xml, Gemfile.lock)
ecosystem_mode: installed

# Correlate binary finds against package-DB file ownership (managed/unmanaged).
correlate_ownership: true

# Extra binary-classifier definition files (YAML/JSON), loaded in addition to the
# built-ins — add classifiers without touching code. See the README.
# classifier_files:
#   - /etc/glance/extra-classifiers.yaml
classifier_files: []

# ---------------------------------------------------------------------------
# Windows-specific
# ---------------------------------------------------------------------------

# PE file extensions scanned by win_binary.
win_pe_extensions:
  - .dll
  - .exe
  - .sys

# Discovery engine for Windows binary scanning.
# auto | mft | walk
win_binary_engine: auto

# ---------------------------------------------------------------------------
# Content scan
# ---------------------------------------------------------------------------

# Skip content scan of files larger than this (bytes). Default 200 MiB.
max_file_size: 209715200

# Read only the first 4 bytes for the ELF magic before a full scan. Off by
# default: some classifiers target scripts (composer, wp, elixir), so a global
# ELF gate would cause silent false negatives.
elf_precheck: false

# Compute sha256 of matched files (extra I/O).
compute_sha256: false

# ---------------------------------------------------------------------------
log_level: INFO
