# Windows CPE Index
# Maps Windows Uninstall registry DisplayName patterns to upstream CPE / PURL identities.
# Built from production Windows inventory data (IW-07020) + NVD CPE Dictionary 2.0.
#
# Rules:
#   - Only publicly known software with CVE relevance belongs here.
#   - Customer-specific / vendor-internal tools must NOT appear.
#   - display_name_contains: substring match, case-insensitive, ANY of the listed strings.
#   - publisher_contains:    optional extra filter (case-insensitive substring).
#   - version is taken from the registry DisplayVersion field.
#   - {version} in templates is substituted with the DisplayVersion value.

version: 1
