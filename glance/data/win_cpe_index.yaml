  - id: crowdstrike_falcon
    display_name_contains:
      - "CrowdStrike Windows Sensor"
      - "CrowdStrike Sensor Platform"
      - "CrowdStrike Falcon Sensor"
    publisher_contains:
      - "CrowdStrike"
    name: crowdstrike-falcon
    cpe_template: "cpe:2.3:a:crowdstrike:falcon:{version}:*:*:*:*:*:*:*"
    purl_template: "pkg:generic/crowdstrike-falcon@{version}"

