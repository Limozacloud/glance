site_name: glance
site_description: Mini-SBOM scanner — installed packages + unmanaged binaries with PURL/CPE
site_url: https://limozacloud.github.io/glance/
repo_url: https://github.com/Limozacloud/glance
repo_name: Limozacloud/glance

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - autorefs

nav:
  - Overview: index.md
  - Usage:
    - CLI: usage/cli.md
    - Python API: usage/library.md
    - Configuration: usage/config.md
    - Output Formats: usage/outputs.md
    - Catalogers & Groups: usage/catalogers.md
  - Internals:
    - Architecture: internals/architecture.md
    - Binary Classifiers: internals/classifiers.md
    - Ecosystem Parsers: internals/ecosystem.md
    - Windows Catalogers: internals/windows.md
  - Extending:
    - Add a Classifier: extending/classifier.md
    - Add a CPE Entry: extending/cpe-entry.md
    - Add a Cataloger: extending/cataloger.md
